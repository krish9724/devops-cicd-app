name: CI/CD Pipeline — Build, Test & Push to Docker Hub

# ──────────────────────────────────────────────────
# TRIGGER: Runs on every push to main branch
# ──────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ──────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ──────────────────────────────────────────────────
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-cicd-app
  NODE_VERSION: '18'

jobs:

  # ────────────────────────────────────────────────
  # JOB 1: TEST — Run unit tests for backend + frontend
  # ────────────────────────────────────────────────
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from GitHub
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # Step 3: Install server dependencies
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install


      # Step 4: Run backend unit tests
      - name: Run Backend Tests
        working-directory: ./server
        run: npm test

      # Step 5: Install client dependencies
      - name: 📦 Install Client Dependencies
        working-directory: ./client
        run: npm install

      # Step 6: Run frontend tests
      - name: ✅ Run Frontend Tests (React Testing Library)
        working-directory: ./client
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  # ────────────────────────────────────────────────
  # JOB 2: BUILD & PUSH — Docker image to Docker Hub
  # ────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test         # Only runs if tests PASS

    # Only push on actual pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Checkout source code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (for multi-platform builds)
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub using GitHub Secrets
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Extract metadata (tags and labels) for Docker
      - name: 🏷️ Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      # Step 5: Build Docker image from Dockerfile
      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: false        # Build first, don't push yet
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6: Push built image to Docker Hub
      - name: 🚀 Push Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: true         # Now push to registry
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 7: Print image digest for verification
      - name: 🔍 Print Image Digest
        run: |
          echo "✅ Docker Image pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️  Tags: latest, sha-${{ github.sha }}"
          echo "🔗 View at: https://hub.docker.com/r/${{ env.DOCKER_IMAGE }}"

  # ────────────────────────────────────────────────
  # JOB 3: NOTIFY — Pipeline summary
  # ────────────────────────────────────────────────
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: always()

    steps:
      - name: 📋 Print Pipeline Result
        run: |
          echo "=============================="
          echo "  CI/CD PIPELINE COMPLETE"
          echo "=============================="
          echo "✅ Tests:       ${{ needs.test.result }}"
          echo "✅ Build+Push:  ${{ needs.build-and-push.result }}"
          echo "🕐 Triggered by: ${{ github.actor }}"
          echo "📌 Commit: ${{ github.sha }}"
          echo "=============================="
